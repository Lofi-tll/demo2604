server:
  port: 8081  # 你要的端口

spring:
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/demo_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 123456
  Jackson:
    # 解决时区差8小时，强制使用上海时区
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j 接口文档（修正后无报错版）
knife4j:
  enable: true
  setting:
    language: ZH_CN  # 中文显示
    enable-open-api:
      group:
        default:
          api-rule: package
          api-rule-resources:
          - com.org.democontroller

# 监控 Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always