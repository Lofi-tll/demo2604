server:
  port: 8081  # 端口号


logging:
  level:
    root: info
    org.springframework: info
    org.apache.ibatis: info  # 关键：关闭数据打印
    com.org.democommon: debug  #security配置log记录对token匹配的信息


spring:
  # Spring Security 配置
  security:
    user:
      name: lofi
      password: 123456
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/demo_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 10 #连接池最大连接数
      minimum-idle: 10 #连接池最小空闲连接数
      idle-timeout: 3000 #连接池中连接的最大空闲时间，单位毫秒
      max-lifetime: 1800000 #连接池中连接的最大生命周期，单位毫秒
  Jackson:
    # 解决时区差8小时，强制使用上海时区
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j 接口文档（修正后无报错版）
knife4j:
  enable: true
  setting:
    language: ZH_CN
# 监控 Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always